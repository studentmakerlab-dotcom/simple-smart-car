<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ma Boutique en Ligne</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100">

    <header class="bg-white shadow-md p-5 text-center">
        <h1 class="text-3xl font-bold text-gray-800">Ma Boutique</h1>
    </header>

    <main class="container mx-auto p-6">
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            
            <div class="bg-white rounded-lg shadow-lg p-4">
                <img src="https://via.placeholder.com/300" alt="Produit" class="w-full h-48 object-cover rounded">
                <h2 class="text-xl font-semibold mt-4">Nom du Produit 1</h2>
                <p class="text-gray-600 mt-2">Description courte du produit.</p>
                <p class="text-blue-600 font-bold mt-2">29.99 €</p>
                <button class="mt-4 w-full bg-blue-500 text-white py-2 rounded hover:bg-blue-600 transition">Ajouter au panier</button>
            </div>

            <div class="bg-white rounded-lg shadow-lg p-4">
                <img src="https://via.placeholder.com/300" alt="Produit" class="w-full h-48 object-cover rounded">
                <h2 class="text-xl font-semibold mt-4">Nom du Produit 2</h2>
                <p class="text-gray-600 mt-2">Description courte du produit.</p>
                <p class="text-blue-600 font-bold mt-2">49.99 €</p>
                <button class="mt-4 w-full bg-blue-500 text-white py-2 rounded hover:bg-blue-600 transition">Ajouter au panier</button>
            </div>

            <div class="bg-white rounded-lg shadow-lg p-4">
                <img src="https://via.placeholder.com/300" alt="Produit" class="w-full h-48 object-cover rounded">
                <h2 class="text-xl font-semibold mt-4">Nom du Produit 3</h2>
                <p class="text-gray-600 mt-2">Description courte du produit.</p>
                <p class="text-blue-600 font-bold mt-2">19.99 €</p>
                <button class="mt-4 w-full bg-blue-500 text-white py-2 rounded hover:bg-blue-600 transition">Ajouter au panier</button>
            </div>

        </div>
    </main>

</body>
</html>
